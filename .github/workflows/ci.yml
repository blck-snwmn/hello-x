name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun build --target=bun grok/src/client.ts grok/src/ask.ts grok/src/summarize-tweets.ts --outdir /tmp/hello-x-grok-build
      - run: bun build --target=bun x/src/client.ts x/src/filtered-stream.ts x/src/user-tweets.ts --outdir /tmp/hello-x-x-build
